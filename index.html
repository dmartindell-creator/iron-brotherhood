<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Command Center</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px}
.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:2rem}
.pin-title{font-size:22px;font-weight:700;text-align:center}
.pin-sub{font-size:13px;color:#666;text-align:center;max-width:320px;line-height:1.6}
.pin-row{display:flex;gap:8px}
.pin-field{width:130px;text-align:center;font-size:24px;font-weight:600;letter-spacing:6px;padding:10px 12px;border-radius:8px;border:1.5px solid #ccc;outline:none;background:white}
.pin-field:focus{border-color:#1a1a1a}
.pin-btn{padding:10px 22px;border-radius:8px;border:none;background:#1a1a1a;color:white;font-size:14px;font-weight:500;cursor:pointer}
.pin-err{font-size:12px;color:#c02828;background:#fceaea;padding:6px 12px;border-radius:6px}
.pin-note{font-size:11px;color:#999;text-align:center;max-width:280px;line-height:1.6}
.app{display:none;min-height:100vh;flex-direction:column}
.hdr{background:white;border-bottom:1px solid #e5e3dc;padding:10px 14px 8px;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-size:15px;font-weight:700}
.logo-row{display:flex;align-items:center;gap:8px}
.pin-bdg{font-size:10px;color:#999;background:#f5f4f0;border:1px solid #e0ddd6;padding:2px 7px;border-radius:6px;cursor:pointer}
.sync{font-size:10px;padding:3px 9px;border-radius:8px;font-weight:500}
.s-ok{background:#e0f3ea;color:#1a6b40}
.s-save{background:#fdf3dc;color:#7a5010}
.s-err{background:#fceaea;color:#c02828}
.profile-tabs{display:flex;gap:4px;margin-bottom:8px;background:#f5f4f0;padding:3px;border-radius:8px}
.ptab{flex:1;text-align:center;padding:6px 8px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;color:#888;border:none;background:transparent}
.ptab.active{background:white;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.ptab.darius.active{color:#1a5a9b}
.ptab.kelcie.active{color:#9b1a5a}
.ptab.family.active{color:#1a7a50}
.ntabs{display:flex;gap:3px;overflow-x:auto;margin-bottom:8px;scrollbar-width:none}
.ntabs::-webkit-scrollbar{display:none}
.ntab{flex-shrink:0;padding:5px 11px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:#888;border:none;letter-spacing:.04em;text-transform:uppercase}
.ntab.active{background:#1a1a1a;color:white}
.wnav{display:flex;align-items:center;gap:6px}
.wb{background:white;border:1px solid #ddd;border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#666}
.wlbl{font-size:11px;color:#666;font-weight:500;min-width:130px;text-align:center}
.dtabs{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none}
.dtabs::-webkit-scrollbar{display:none}
.main{padding:12px;max-width:600px;margin:0 auto;padding-bottom:40px;flex:1}
.page{display:none;flex-direction:column;gap:5px}
.page.active{display:flex}
.spin-wrap{display:flex;align-items:center;justify-content:center;gap:8px;padding:48px;color:#999;font-size:13px}
.spinner{width:16px;height:16px;border:2px solid #e0ddd6;border-top-color:#1a1a1a;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.dh{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #e5e3dc}
.dn{font-size:26px;font-weight:700}
.dm{text-align:right}.dfl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.07em}
.dfv{font-size:12px;font-weight:500;color:#555;margin-top:2px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.stat{background:white;border:1px solid #e5e3dc;border-radius:8px;padding:9px 10px;text-align:center}
.snum{font-size:20px;font-weight:700}.slbl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.sec{margin-bottom:12px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.st{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:#999;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.card{background:white;border:1px solid #e5e3dc;border-radius:10px;padding:12px 14px;margin-bottom:5px}
.hr{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid #f0ede6;cursor:pointer;user-select:none}
.hr:last-child{border-bottom:none;padding-bottom:0}
.hr:first-child{padding-top:0}
.hc{width:20px;height:20px;border-radius:50%;border:1.5px solid #ddd;background:white;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:white;transition:all .15s}
.hc.on{background:#1a7a50;border-color:#1a7a50}
.hc.on-j{background:#1a5a9b;border-color:#1a5a9b}
.hc.on-k{background:#9b1a5a;border-color:#9b1a5a}
.hl{flex:1;font-size:13px;color:#444}
.hl.on{text-decoration:line-through;color:#bbb}
.htag{font-size:10px;padding:2px 7px;border-radius:6px;background:#f5f4f0;color:#999;white-space:nowrap;flex-shrink:0}
.bl{display:flex;align-items:stretch;border-radius:8px;overflow:hidden;border:1px solid #e5e3dc;margin-bottom:3px}
.ba{width:4px;flex-shrink:0}
.blb{min-width:58px;font-size:10px;color:#999;padding:8px 6px;display:flex;align-items:center;justify-content:center;border-right:1px solid #e5e3dc;background:#faf9f6;font-weight:600;text-align:center;line-height:1.3}
.blc{flex:1;padding:8px 11px}
.blt{font-size:12px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;flex-wrap:wrap;gap:3px}
.bls{font-size:11px;color:#666;margin-top:2px;line-height:1.5}
.bdg{display:inline-block;font-size:10px;padding:1px 6px;border-radius:5px;font-weight:500}
.bg2{background:#e0f3ea;color:#1a6b40}
.bi2{background:#e6eef8;color:#1a5a9b}
.lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#999;display:block;margin-bottom:4px}
textarea,input[type=text],input[type=number]{width:100%;background:#faf9f6;border:1px solid #e0ddd6;border-radius:6px;padding:8px 10px;font-family:inherit;font-size:13px;color:#1a1a1a;outline:none;resize:none}
textarea:focus,input:focus{border-color:#1a1a1a}
textarea{min-height:68px;line-height:1.6}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{display:none}
.pbar{height:4px;background:#e5e3dc;border-radius:2px;overflow:hidden;margin-top:4px}
.pbf{height:100%;border-radius:2px;transition:width .3s}
.prompt{border-radius:10px;padding:12px 14px;margin-bottom:5px}
.pcat{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px}
.pq{font-size:15px;font-style:italic;color:#1a1a1a;line-height:1.5}
.ph{font-size:11px;color:#666;margin-top:5px;line-height:1.5}
.vl{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:#1a5a9b;text-decoration:none;border:1px solid #b0c8e8;border-radius:5px;padding:3px 8px;margin:3px 2px 0 0;background:#e6eef8}
.vl:hover{background:#1a5a9b;color:white}
.sets{display:flex;gap:4px;flex-wrap:wrap;margin:5px 0}
.sp{font-size:10px;padding:2px 8px;border-radius:7px;border:1px solid;font-weight:500}
.sw{background:#e1f5ee;border-color:#5dcaa5;color:#0a5a3a}
.st2{background:#eeedfe;border-color:#afa9ec;color:#3a2a9a}
.sv{background:#faeeda;border-color:#fac775;color:#6a4010}
.se{background:#eaf3de;border-color:#97c459;color:#2a5a10}
.note{font-size:11px;color:#555;padding:8px 11px;background:#faf9f6;border-radius:6px;border:1px solid #e5e3dc;line-height:1.6;margin:4px 0}
.divider{height:1px;background:#e5e3dc;margin:16px 0}
.wtabs{display:flex;gap:4px;margin-bottom:7px;flex-wrap:wrap}
.wt{padding:3px 10px;border-radius:5px;border:1px solid #ddd;font-size:11px;cursor:pointer;background:white;color:#888}
.wt.active{background:#faf9f6;color:#1a1a1a;border-color:#888;font-weight:500}
.mini{width:64px;text-align:center;padding:4px 7px;font-size:13px;font-weight:500}
.mr{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0ede6}
.mr:last-child{border-bottom:none}
.ml{font-size:12px;color:#666}
.a-teal{background:#1D9E75}.a-purple{background:#7F77DD}.a-amber{background:#EF9F27}
.a-blue{background:#378ADD}.a-coral{background:#D85A30}.a-green{background:#639922}
.a-gold{background:#BA7517}.a-gray{background:#888780}.a-pink{background:#D4537E}
.a-rose{background:#c0386a}.a-sky{background:#2a8ad4}
/* phase checkable row */
.phase-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0ede6;cursor:pointer;user-select:none}
.phase-row:last-child{border-bottom:none}
.phase-row:first-child{padding-top:0}
.phase-check{width:20px;height:20px;border-radius:4px;border:1.5px solid #ddd;background:white;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:white;transition:all .15s}
.phase-check.on{background:#1a5a9b;border-color:#1a5a9b}
.phase-label{flex:1;font-size:12px;color:#444;font-weight:500}
/* set logger */
.set-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin:6px 0}
.set-cell{background:#faf9f6;border:1px solid #e0ddd6;border-radius:5px;padding:4px 5px;text-align:center}
.set-cell-hdr{font-size:9px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.set-cell input{background:transparent;border:none;text-align:center;font-size:12px;font-weight:600;padding:2px;width:100%}
.set-cell input:focus{outline:none}
/* supplement */
.supp-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0ede6}
.supp-row:last-child{border-bottom:none}
.supp-name{flex:1;font-size:12px;color:#1a1a1a}
.supp-time{font-size:11px;color:#999;flex-shrink:0;min-width:60px;text-align:right}
/* family cards */
.family-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.person-card{border-radius:10px;padding:12px;border:1px solid}
.person-name{font-size:14px;font-weight:700;margin-bottom:8px}
.ps-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.ps-label{font-size:11px;color:#666}
.ps-val{font-size:11px;font-weight:500}
.habit-dots{display:flex;gap:3px;flex-wrap:wrap;margin:4px 0}
.hdot{width:8px;height:8px;border-radius:50%}
.conn-card{background:white;border:1px solid #e5e3dc;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.conn-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#999;margin-bottom:8px}
.lucas-entry{background:#fdf3dc;border:1px solid #e8cc80;border-radius:8px;padding:10px 12px;margin-bottom:6px}
.lucas-who{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8a6010;margin-bottom:3px}
.lucas-text{font-size:12px;color:#1a1a1a;line-height:1.5;font-style:italic}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
.cal-hc{text-align:center;font-size:10px;font-weight:600;color:#999;text-transform:uppercase;padding:4px 0}
.cal-cell{border:1px solid #e5e3dc;border-radius:7px;padding:5px;min-height:58px;background:white;cursor:pointer}
.cal-cell.today{border-color:#e8cc80;border-width:2px}
.cal-cell.selected{border-color:#1a1a1a;border-width:2px}
.cal-cell.other{opacity:.3}
.cal-dn{font-size:11px;font-weight:500;color:#666;margin-bottom:3px}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap}
.cdot{width:5px;height:5px;border-radius:50%}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.cleg{display:flex;align-items:center;gap:4px;font-size:10px;color:#666}
/* chore list */
.chore-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0ede6}
.chore-row:last-child{border-bottom:none}
.chore-text{flex:1;font-size:12px;color:#1a1a1a}
.chore-text.done-txt{text-decoration:line-through;color:#bbb}
.chore-who{font-size:10px;padding:1px 7px;border-radius:5px;font-weight:500;flex-shrink:0}
.who-d{background:#e6eef8;color:#1a5a9b}
.who-k{background:#f8e6f0;color:#9b1a5a}
.who-both{background:#e0f3ea;color:#1a6b40}
</style>

<body>

<div id="pinScreen" class="pin-screen">
  <div style="font-size:36px;margin-bottom:-8px">🏠</div>
  <div class="pin-title">Family Command Center</div>
  <div class="pin-sub">One PIN for the whole family. Darius and Kelcie both enter the same PIN — synced to Google Sheets on every device.</div>
  <div class="pin-row">
    <input class="pin-field" id="pinInput" type="number" placeholder="1234" maxlength="6">
    <button class="pin-btn" onclick="enterPin()">Enter</button>
  </div>
  <div id="pinErr" class="pin-err" style="display:none"></div>
  <div class="pin-note">Same PIN works on every device — phone, computer, tablet.</div>
</div>

<div id="mainApp" class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo-row">
        <div class="logo">Family Command</div>
        <div class="pin-bdg" id="pinBdg" onclick="changePIN()">PIN ••••</div>
      </div>
      <div id="syncBadge" class="sync s-save">Connecting...</div>

    <div class="profile-tabs">

      <button class="ptab kelcie" id="ptab-kelcie" onclick="switchProfile('kelcie',this)">Kelcie</button>

  <div class="main">

    <div id="page-calendar" class="page"><div id="calContent"></div></div>
    <div id="page-sunday" class="page"><div id="sundayContent"></div></div>

</div>

<script>
const SHEET='https://script.google.com/macros/s/AKfycbycxvMUZL_gWlq5ZT011Oopk-EFkuLjiz6bH0VJqyAptgguGwPJAsgd35Knskrm7xpEzg/exec';
let _n=0;
function jsonp(url){
  return new Promise((res,rej)=>{
    const cb='_wc'+(++_n),s=document.createElement('script');
    const t=setTimeout(()=>{cleanup();rej(new Error('timeout'))},10000);
    function cleanup(){clearTimeout(t);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);}
    window[cb]=d=>{cleanup();res(d);};
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb+'&t='+Date.now();
    s.onerror=()=>{cleanup();rej(new Error('err'));};
    document.head.appendChild(s);
  });
}

function getMarathonWeek(){

function wk(o=0){const n=new Date(),d=n.getDay(),s=new Date(n);s.setDate(n.getDate()-d+(o*7));return s.toISOString().split('T')[0];}
function wDates(o=0){const n=new Date(),d=n.getDay(),s=new Date(n);s.setDate(n.getDate()-d+(o*7));return Array.from({length:7},(_,i)=>{const x=new Date(s);x.setDate(s.getDate()+i);return x;});}
function fmtR(o){const d=wDates(o),op={month:'short',day:'numeric'};return d[1].toLocaleDateString('en-US',op)+' – '+d[6].toLocaleDateString('en-US',op);}
function sb(s,m){const b=document.getElementById('syncBadge');if(!b)return;if(s==='ok'){b.className='sync s-ok';b.textContent='Synced ✓'}else if(s==='s'){b.className='sync s-save';b.textContent='Saving...'}else if(s==='l'){b.className='sync s-save';b.textContent='Loading...'}else{b.className='sync s-err';b.textContent=m||'Local only'}}
function lk(){return 'fcc2_'+pin+'_'+wk(wOff);}
async function load(){
  sb('l');
  try{
    const r=await jsonp(SHEET+'?action=get&key='+encodeURIComponent(lk()));
    if(r&&r.status==='found'&&r.value){state=JSON.parse(r.value);try{localStorage.setItem(lk(),r.value)}catch(e){}sb('ok');}
    else{try{const l=localStorage.getItem(lk());state=l?JSON.parse(l):{}}catch(e){state={}}sb('ok');}
  }catch(e){try{const l=localStorage.getItem(lk());state=l?JSON.parse(l):{}}catch(e2){state={}}sb('err','Local only');}
  loaded=true;
}
function sched(){sb('s');if(sTimer)clearTimeout(sTimer);sTimer=setTimeout(doSave,1200);}
async function doSave(){
  const p=JSON.stringify(state);
  try{localStorage.setItem(lk(),p)}catch(e){}
  try{const r=await jsonp(SHEET+'?action=set&key='+encodeURIComponent(lk())+'&value='+encodeURIComponent(p));sb(r&&r.status==='saved'?'ok':'err','Local only');}
  catch(e){sb('err','Local only');}
}
function g(p,d=null){const pts=p.split('.');let o=state;for(const x of pts){if(o==null||typeof o!=='object')return d;o=o[x];}return o!=null?o:d;}
function sv(p,v){const pts=p.split('.');let o=state;for(let i=0;i<pts.length-1;i++){if(!o[pts[i]])o[pts[i]]={};o=o[pts[i]];}o[pts[pts.length-1]]=v;sched();}
function tog(p){sv(p,!g(p,false));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function editSupplements(who){
  const suppKey=who==='d'?'d_supplements':'k_supplements';

  let supps;
  try{supps=JSON.parse(g(suppKey,null))||defaultSupps;}catch(e){supps=defaultSupps;}
  
  // Build inline editor modal
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px';
  
  const modal=document.createElement('div');
  modal.style.cssText='background:white;border-radius:12px;padding:20px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto';
  
  let rows=supps.map((s,i)=>`
    <div id="supp-row-${i}" style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <input id="supp-name-${i}" type="text" value="${s.name}" placeholder="Supplement name" style="flex:1;padding:7px 9px;border:1px solid #e0ddd6;border-radius:6px;font-size:13px">
      <input id="supp-time-${i}" type="text" value="${s.time}" placeholder="Time" style="width:90px;padding:7px 9px;border:1px solid #e0ddd6;border-radius:6px;font-size:13px">
      <button onclick="document.getElementById('supp-row-${i}').remove()" style="width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:white;color:#999;cursor:pointer;font-size:16px;flex-shrink:0">×</button>
    </div>`).join('');
  
  modal.innerHTML=`
    <div style="font-size:15px;font-weight:700;margin-bottom:4px">Edit supplements</div>
    <div style="font-size:11px;color:#999;margin-bottom:14px">Name + when you take it. Tap × to remove.</div>
    <div id="supp-rows">${rows}</div>
    <button onclick="
      const nr=document.createElement('div');
      const idx=Date.now();
      nr.id='supp-row-'+idx;
      nr.style.cssText='display:flex;gap:8px;margin-bottom:8px;align-items:center';
      nr.innerHTML=\`<input id='supp-name-\${idx}' type='text' placeholder='Supplement name' style='flex:1;padding:7px 9px;border:1px solid #e0ddd6;border-radius:6px;font-size:13px'><input id='supp-time-\${idx}' type='text' placeholder='Time' style='width:90px;padding:7px 9px;border:1px solid #e0ddd6;border-radius:6px;font-size:13px'><button onclick='this.parentNode.remove()' style='width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:white;color:#999;cursor:pointer;font-size:16px;flex-shrink:0'>×</button>\`;
      document.getElementById('supp-rows').appendChild(nr);
    " style="width:100%;padding:8px;border-radius:6px;border:1px dashed #ddd;background:#faf9f6;color:#888;font-size:12px;cursor:pointer;margin-bottom:12px">+ Add supplement</button>
    <div style="display:flex;gap:8px">
      <button onclick="
        const rows=document.querySelectorAll('[id^=supp-row-]');
        const newSupps=[];
        rows.forEach(row=>{
          const idx=row.id.replace('supp-row-','');
          const name=document.getElementById('supp-name-'+idx);
          const time=document.getElementById('supp-time-'+idx);
          if(name&&name.value.trim())newSupps.push({name:name.value.trim(),time:time?time.value.trim()||'Daily':'Daily'});
        });
        sv('${suppKey}',JSON.stringify(newSupps));
        document.body.removeChild(document.getElementById('supp-overlay'));
        renderAll();
      " style="flex:1;padding:10px;border-radius:8px;border:none;background:#1a1a1a;color:white;font-size:13px;font-weight:600;cursor:pointer">Save</button>
      <button onclick="document.body.removeChild(document.getElementById('supp-overlay'))" style="padding:10px 16px;border-radius:8px;border:1px solid #ddd;background:white;color:#666;font-size:13px;cursor:pointer">Cancel</button>
    </div>`;
  
  overlay.id='supp-overlay';
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

// TO-DO LIST
function getTodos(){try{return JSON.parse(g('household.todos','[]'))||[];}catch(e){return [];}}
function saveTodos(t){sv('household.todos',JSON.stringify(t));}
function addTodo(){
  const inp=document.getElementById('todoInput');if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  const todos=getTodos();todos.push({id:Date.now(),text,done:false});
  saveTodos(todos);inp.value='';renderTodoList();
}
function toggleTodo(id){const t=getTodos();const x=t.find(i=>i.id===id);if(x)x.done=!x.done;saveTodos(t);renderTodoList();}
function deleteTodo(id){saveTodos(getTodos().filter(i=>i.id!==id));renderTodoList();}
function renderTodoList(){
  const el=document.getElementById('todoList');if(!el)return;
  const todos=getTodos();
  if(!todos.length){el.innerHTML='<div style="font-size:12px;color:#bbb;text-align:center;padding:6px 0">No tasks yet</div>';return;}
  const open=todos.filter(t=>!t.done),done=todos.filter(t=>t.done);
  let H='';
  open.forEach(t=>{H+=`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0ede6">
    <div onclick="toggleTodo(${t.id})" style="width:20px;height:20px;border-radius:50%;border:1.5px solid #ddd;background:white;flex-shrink:0;cursor:pointer"></div>
    <div style="flex:1;font-size:13px;color:#1a1a1a">${esc(t.text)}</div>
    <div onclick="deleteTodo(${t.id})" style="font-size:18px;color:#bbb;cursor:pointer;padding:0 4px;line-height:1">×</div>
  </div>`;});
  if(done.length){
    H+=`<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#bbb;margin:8px 0 4px">Done</div>`;
    done.forEach(t=>{H+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0ede6">
      <div onclick="toggleTodo(${t.id})" style="width:20px;height:20px;border-radius:50%;border:1.5px solid #1a7a50;background:#1a7a50;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;font-size:10px">✓</div>
      <div style="flex:1;font-size:12px;color:#bbb;text-decoration:line-through">${esc(t.text)}</div>
      <div onclick="deleteTodo(${t.id})" style="font-size:18px;color:#ddd;cursor:pointer;padding:0 4px;line-height:1">×</div>
    </div>`;});
    H+=`<div onclick="clearDoneTodos()" style="font-size:11px;color:#999;cursor:pointer;text-align:right;padding:6px 0">Clear completed</div>`;
  }
  el.innerHTML=H;
}
function clearDoneTodos(){saveTodos(getTodos().filter(t=>!t.done));renderTodoList();}

// CHORE LIST
function getChores(){try{return JSON.parse(g('household.chores',null))||DEFAULT_CHORES;}catch(e){return DEFAULT_CHORES;}}
function saveChores(c){sv('household.chores',JSON.stringify(c));}
function toggleChore(i){const c=getChores();c[i].done=!c[i].done;saveChores(c);renderChoreList();}
function cycleChoreWho(i){const c=getChores();const cycle={d:'k',k:'both',both:'d'};c[i].who=cycle[c[i].who]||'both';saveChores(c);renderChoreList();}
function deleteChore(i){const c=getChores();c.splice(i,1);saveChores(c);renderChoreList();}
function addChore(){
  const inp=document.getElementById('choreInput');if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  const c=getChores();c.push({text,who:'both',done:false});
  saveChores(c);inp.value='';renderChoreList();
}
function resetChores(){if(confirm('Reset all chores as undone for the new week?')){const c=getChores();c.forEach(x=>x.done=false);saveChores(c);renderChoreList();}}
function renderChoreList(){
  const el=document.getElementById('choreList');if(!el)return;
  const chores=getChores();
  if(!chores.length){el.innerHTML='<div style="font-size:12px;color:#bbb;text-align:center;padding:6px 0">No chores yet</div>';return;}
  const open=chores.filter(c=>!c.done),done=chores.filter(c=>c.done);
  const whoLabel=(who,idx)=>who==='d'?`<span class="chore-who who-d" onclick="cycleChoreWho(${idx})" style="cursor:pointer" title="Tap to change">Darius</span>`:who==='k'?`<span class="chore-who who-k" onclick="cycleChoreWho(${idx})" style="cursor:pointer" title="Tap to change">Kelcie</span>`:`<span class="chore-who who-both" onclick="cycleChoreWho(${idx})" style="cursor:pointer" title="Tap to change">Both</span>`;
  let H='';
  open.forEach((c,i)=>{
    const realIdx=chores.indexOf(c);
    H+=`<div class="chore-row">
      <div onclick="toggleChore(${realIdx})" style="width:20px;height:20px;border-radius:50%;border:1.5px solid #ddd;background:white;flex-shrink:0;cursor:pointer"></div>
      <div class="chore-text">${esc(c.text)}</div>
      ${whoLabel(c.who,realIdx)}
      <div onclick="deleteChore(${realIdx})" style="font-size:16px;color:#bbb;cursor:pointer;padding:0 2px;line-height:1">×</div>
    </div>`;
  });
  if(done.length){
    H+=`<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#bbb;margin:8px 0 4px">Completed</div>`;
    done.forEach((c,i)=>{
      const realIdx=chores.indexOf(c);
      H+=`<div class="chore-row">
        <div onclick="toggleChore(${realIdx})" style="width:20px;height:20px;border-radius:50%;border:1.5px solid #1a7a50;background:#1a7a50;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;font-size:10px">✓</div>
        <div class="chore-text done-txt">${esc(c.text)}</div>
        ${whoLabel(c.who,realIdx)}
        <div onclick="deleteChore(${realIdx})" style="font-size:16px;color:#ddd;cursor:pointer;padding:0 2px;line-height:1">×</div>
      </div>`;
    });
  }
  el.innerHTML=H;
}

function getWO(date){const n=new Date(),d=n.getDay(),s=new Date(n);s.setDate(n.getDate()-d);const ds=new Date(date);ds.setDate(date.getDate()-date.getDay());return Math.round((ds-s)/(7*24*60*60*1000));}

  <div class="prompt" style="background:#f8e6f0;border:1px solid #e8b0c8"><div class="pcat" style="color:#9b1a5a">${p.c}</div><div class="pq">"${p.q}"</div><div class="ph">${p.h}</div></div>
  <div class="card">
    <div style="margin-bottom:8px"><label class="lbl">Win as a mother</label><input type="text" value="${esc(g(`${dk}.review.mother`,''))}" oninput="sv('${dk}.review.mother',this.value)" placeholder="..."></div>
    <div style="margin-bottom:8px"><label class="lbl">Win as a photographer</label><input type="text" value="${esc(g(`${dk}.review.photographer`,''))}" oninput="sv('${dk}.review.photographer',this.value)" placeholder="..."></div>
    <div style="margin-bottom:8px"><label class="lbl">Win as a wife</label><input type="text" value="${esc(g(`${dk}.review.wife`,''))}" oninput="sv('${dk}.review.wife',this.value)" placeholder="..."></div>
    <div style="margin-bottom:8px"><label class="lbl">Win as a disciple</label><input type="text" value="${esc(g(`${dk}.review.disciple`,''))}" oninput="sv('${dk}.review.disciple',this.value)" placeholder="..."></div>
    <label class="lbl">One thing differently next week</label>
    <textarea oninput="sv('${dk}.review.improve',this.value)" style="min-height:52px">${esc(g(`${dk}.review.improve`,''))}</textarea>
  </div></div>
  <div class="divider"></div>
  <div class="sec"><div class="sh"><div class="st"><div class="dot a-rose"></div>Next week — photography</div></div>
  <div class="card">
    <div style="margin-bottom:7px"><label class="lbl">Sessions goal this month</label>
      <input type="text" value="${esc(g('kelcieTargets.bizGoal',''))}" oninput="sv('kelcieTargets.bizGoal',this.value)" placeholder="e.g. Book 2 sessions, post 3x this week...">
    </div>
    <div style="margin-bottom:7px"><label class="lbl">Sessions booked or in progress</label>
      <textarea style="min-height:50px" placeholder="Any booked or potential sessions?" oninput="sv('kelcieTargets.sessions',this.value)">${esc(g('kelcieTargets.sessions',''))}</textarea>
    </div>
    <label class="lbl">One business task per day this week</label>
    <textarea placeholder="Mon:&#10;Tue:&#10;Wed:&#10;Thu:&#10;Fri:" oninput="sv('kelcieTargets.bizPlan',this.value)" style="min-height:80px">${esc(g('kelcieTargets.bizPlan',''))}</textarea>
  </div></div>
  <div class="sec"><div class="sh"><div class="st"><div class="dot a-amber"></div>Next week — Lucas + self</div></div>
  <div class="card">
    <div style="margin-bottom:7px"><label class="lbl">One thing to try with Lucas this week</label>
      <input type="text" value="${esc(g('kelcieTargets.lucasActivity',''))}" oninput="sv('kelcieTargets.lucasActivity',this.value)" placeholder="New activity, outing, milestone to watch for...">
    </div>
    <label class="lbl">Self-care intention this week</label>
    <input type="text" value="${esc(g('kelcieTargets.selfcare',''))}" oninput="sv('kelcieTargets.selfcare',this.value)" placeholder="Something just for you — even small...">
  </div></div>
  <div class="sec"><div class="sh"><div class="st"><div class="dot a-gold"></div>Today's habits</div></div>
  <div class="card">
    ${hr(dk,'scripture','Scripture reading','Morning','k')}
    ${hr(dk,'church','Church attendance','Sabbath','k')}
    ${hr(dk,'lucas','Intentional time with Lucas','Today','k')}
    ${hr(dk,'journal','Journal + weekly review','Tonight','k')}
    ${hr(dk,'winddown','Wind-down — start by 9:15pm','9:15pm','k')}
    <div style="padding:7px 0 0"><label class="lbl">Lucas moment today</label>
      <input type="text" placeholder="Something he did worth remembering..." value="${esc(g(`${dk}.lucasmoment`,''))}" oninput="sv('${dk}.lucasmoment',this.value)">
    </div>
  </div></div>`;
}
